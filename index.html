<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Agent Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    @media screen and (max-width: 768px) {
      .sidebar-toggle {
        position: fixed;
        top: 14px;
        left: 14px;
        width: 52px;
        height: 52px;
        padding: 11px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.24);
        z-index: 40;
      }
      .sidebar-toggle span {
        background-color: #42b983;
        display: block;
        height: 3px;
        margin: 6px 0;
        width: 26px;
        border-radius: 999px;
      }
      .sidebar {
        top: 0;
        padding-top: 72px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 16px 40px rgba(0,0,0,0.24);
        z-index: 35;
      }
      .content {
        padding-top: 72px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'agent-wiki',
      repo: 'shdkej/agent-wiki',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: false,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
        depth: 3
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
